<!DOCTYPE html>
<html lang="th">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>สมัครสมาชิก — DO MOVIE</title>
  <link rel="stylesheet" href="../css/regist.css">
  <script src="../js/config.js"></script>
</head>

<body>

  <div class="auth-wrapper fade">
    <a href="main.html" class="back-btn">← กลับหน้าหลัก</a>
    <div class="auth-card">
      <h2>สมัครสมาชิก</h2>
      <form id="registForm">
        <label>Username *</label>
        <input type="text" id="usernameInput" placeholder="พิมพ์ชื่อผู้ใช้" required>

        <label>Email *</label>
        <input type="email" id="emailInput" placeholder="อีเมลของคุณ" required>

        <label>Password *</label>
        <input type="password" id="passwordInput" placeholder="พิมพ์รหัสผ่าน" required>

        <label>Confirm Password *</label>
        <input type="password" id="confirmPasswordInput" placeholder="ยืนยันรหัสผ่าน" required>

        <p id="errorMessage" style="color:#ff6b6b;font-size:0.85rem;text-align:center;margin-top:1rem;display:none;"></p>
        <p id="successMessage" style="color:#4CAF50;font-size:0.85rem;text-align:center;margin-top:1rem;display:none;"></p>

        <button type="submit">สมัครสมาชิก</button>
      </form>
      <div class="auth-link">
        มีบัญชีอยู่แล้วใช่หรือไม่? <a href="login.html">เข้าสู่ระบบ</a>
      </div>
    </div>
  </div>

  <script>
    document.querySelectorAll('.fade').forEach(el => el.classList.add('show'));

    document.getElementById('registForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const username = document.getElementById('usernameInput').value;
      const email = document.getElementById('emailInput').value;
      const password = document.getElementById('passwordInput').value;
      const confirm = document.getElementById('confirmPasswordInput').value;
      const errorMsg = document.getElementById('errorMessage');
      const successMsg = document.getElementById('successMessage');
      const btn = e.target.querySelector('button');

      errorMsg.style.display = 'none';
      successMsg.style.display = 'none';

      if (password !== confirm) {
        errorMsg.textContent = 'รหัสผ่านไม่ตรงกัน';
        errorMsg.style.display = 'block';
        return;
      }

      btn.disabled = true;
      btn.textContent = 'กำลังสมัคร...';

      try {
        const res = await fetch(`${API_BASE}/auth/register/`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ username, email, password }),
        });
        const data = await res.json();

        if (res.ok) {
          successMsg.textContent = 'สมัครสมาชิกสำเร็จ! กำลังพาไปหน้าเข้าสู่ระบบ...';
          successMsg.style.display = 'block';
          setTimeout(() => { window.location.href = 'login.html'; }, 1500);
        } else {
          const firstError = Object.values(data)[0];
          errorMsg.textContent = Array.isArray(firstError) ? firstError[0] : firstError;
          errorMsg.style.display = 'block';
        }
      } catch {
        errorMsg.textContent = 'ไม่สามารถเชื่อมต่อเซิร์ฟเวอร์ได้';
        errorMsg.style.display = 'block';
      } finally {
        btn.disabled = false;
        btn.textContent = 'สมัครสมาชิก';
      }
    });
  </script>

</body>

</html>
