<!DOCTYPE html>
<html lang="th">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ผู้กำกับ — DO MOVIE</title>
  <link rel="stylesheet" href="../css/index.css">
  <script src="../js/config.js"></script>
  <style>
    body { background-color: #2B1F14; }

    .directors-section { padding: 3.5rem 0; min-height: 70vh; }
    .section-header { text-align: center; margin-bottom: 3rem; }
    .section-header h1 {
      font-family: 'Cinzel', serif;
      color: #F2C94C; font-size: 2.2rem; font-weight: 900;
      letter-spacing: 3px; text-transform: uppercase; margin-bottom: 0.5rem;
    }
    .section-header p { color: rgba(255,248,231,0.5); }

    .director-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
      gap: 1.5rem;
    }
    .director-card {
      background: #3A2A1A;
      border-radius: 16px;
      padding: 1.8rem 1.5rem;
      text-align: center;
      cursor: pointer;
      text-decoration: none;
      display: block;
      border: 1px solid rgba(242,201,76,0.1);
      transition: all 0.3s ease;
    }
    .director-card:hover { transform: translateY(-8px); border-color: #F2C94C; box-shadow: 0 12px 30px rgba(0,0,0,0.4); }
    .director-card img {
      width: 110px; height: 110px; border-radius: 50%;
      object-fit: cover; border: 3px solid #F2C94C;
      margin-bottom: 1rem; display: block; margin-left: auto; margin-right: auto;
    }
    .director-card h3 { color: #F2C94C; font-size: 1rem; margin-bottom: 0.3rem; }
    .director-card span { color: rgba(255,248,231,0.5); font-size: 0.82rem; }
    .empty-msg { grid-column: 1/-1; text-align: center; color: rgba(255,248,231,0.4); padding: 4rem 0; }

    .footer-simple { background-color: #1a120b; padding: 18px 0; text-align: center; color: #FFF8E7; font-size: 0.85rem; opacity: 0.6; }
  </style>
</head>

<body>

  <nav>
    <div class="container">
      <div class="nav-con">
        <div class="logo"><a href="main.html">DO <span>MOVIE</span></a></div>
        <ul class="menu">
          <li><a href="main.html">หน้าหลัก</a></li>
          <li class="has-dropdown">
            <a href="#">หมวดหมู่ ▾</a>
            <ul class="dropdown">
              <li><a href="Scifi_movie.html">Sci-Fi</a></li>
              <li><a href="Horor_movie.html">Horror</a></li>
            </ul>
          </li>
          <li><a href="DVD_INCEPTION.html">DVD</a></li>
          <li><a href="Item_forsale.html">ของที่ระลึก</a></li>
          <li><a href="data_board.html">กระดานรีวิว</a></li>
          <li><a href="directors.html" class="active">ผู้กำกับ</a></li>
          <li id="authNav"></li>
        </ul>
      </div>
    </div>
  </nav>

  <section class="directors-section">
    <div class="container">
      <div class="section-header">
        <h1>ผู้กำกับ</h1>
        <p>พบกับผู้สร้างสรรค์ผลงานภาพยนตร์ที่คุณชื่นชอบ</p>
      </div>
      <div class="director-grid" id="directorGrid">
        <p class="empty-msg">กำลังโหลด...</p>
      </div>
    </div>
  </section>

  <div class="footer-simple">&copy; 2026 Web DoMovie. All rights reserved.</div>

  <script>
    (function () {
      const _u = localStorage.getItem('username');
      const _s = localStorage.getItem('is_staff');
      const nav = document.getElementById('authNav');
      if (_u) {
        nav.innerHTML = `${_s === 'true' ? '<a href="/admin-panel/" style="color:#F2C94C;margin-right:8px;">Admin Panel</a>' : ''}<a href="#" id="logoutBtn" style="color:#ff6b6b;">${_u} (ออก)</a>`;
        document.getElementById('logoutBtn').addEventListener('click', e => {
          e.preventDefault(); localStorage.clear(); window.location.href = 'login.html';
        });
      } else {
        nav.innerHTML = '<a href="login.html">เข้าสู่ระบบ</a>';
      }
    })();

    fetch(`${API_BASE}/directors/`)
      .then(r => r.json())
      .then(directors => {
        const grid = document.getElementById('directorGrid');
        if (!directors.length) {
          grid.innerHTML = '<p class="empty-msg">ยังไม่มีข้อมูลผู้กำกับ</p>';
          return;
        }
        grid.innerHTML = directors.map(d => `
          <a href="director-detail.html?id=${d.id}" class="director-card">
            <img src="${getImageUrl(d.profile_image)}" alt="${d.name}" loading="lazy">
            <h3>${d.name}</h3>
            <span>${d.nationality || ''}${d.birth_year ? ' · ' + d.birth_year : ''}</span>
          </a>
        `).join('');
      })
      .catch(() => {
        document.getElementById('directorGrid').innerHTML = '<p class="empty-msg">ไม่สามารถโหลดข้อมูลได้</p>';
      });
  </script>

</body>

</html>
