<!DOCTYPE html>
<html lang="th">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>หนัง Horror — DO MOVIE</title>
  <link rel="stylesheet" href="../css/Horro_movie.css">
  <script src="../js/config.js"></script>
</head>

<body>

  <nav>
    <div class="container">
      <div class="nav-con">
        <div class="logo"><a href="main.html">DO <span>MOVIE</span></a></div>
        <ul class="menu">
          <li><a href="main.html">หน้าหลัก</a></li>
          <li class="has-dropdown">
            <a href="#" class="active">หมวดหมู่ ▾</a>
            <ul class="dropdown">
              <li><a href="Scifi_movie.html">Sci-Fi</a></li>
              <li><a href="Horor_movie.html" style="color:#F2C94C;">Horror</a></li>
            </ul>
          </li>
          <li><a href="DVD_INCEPTION.html">DVD</a></li>
          <li><a href="Item_forsale.html">ของที่ระลึก</a></li>
          <li><a href="data_board.html">กระดานรีวิว</a></li>
          <li><a href="directors.html">ผู้กำกับ</a></li>
          <li id="authNav"></li>
        </ul>
      </div>
    </div>
  </nav>

  <section class="genre-hero">
    <div class="container">
      <span class="genre-hero-icon">👻</span>
      <h1>หนัง Horror</h1>
      <p>ความหวาดกลัวที่ซ่อนอยู่ในความมืด สยองขวัญระทึกขวัญ</p>
    </div>
  </section>

  <section class="maincontent">
    <div class="container">
      <div class="movie-card-grid" id="movieGrid">
        <p class="empty-state">กำลังโหลด...</p>
      </div>
    </div>
  </section>

  <script>
    (function () {
      const _u = localStorage.getItem('username');
      const _s = localStorage.getItem('is_staff');
      const nav = document.getElementById('authNav');
      if (_u) {
        nav.innerHTML = `${_s === 'true' ? '<a href="/admin-panel/" style="color:#F2C94C;margin-right:8px;">Admin Panel</a>' : ''}<a href="#" id="logoutBtn" style="color:#ff6b6b;">${_u} (ออก)</a>`;
        document.getElementById('logoutBtn').addEventListener('click', e => {
          e.preventDefault(); localStorage.clear(); window.location.href = 'login.html';
        });
      } else {
        nav.innerHTML = '<a href="login.html">เข้าสู่ระบบ</a>';
      }
    })();

    fetch(`${API_BASE}/movies/`)
      .then(r => r.json())
      .then(movies => {
        const horror = movies.filter(m => m.genre === 'horror');
        const grid = document.getElementById('movieGrid');
        if (!horror.length) {
          grid.innerHTML = '<p class="empty-state">ยังไม่มีหนัง Horror</p>';
          return;
        }
        grid.innerHTML = horror.map(m => `
          <a href="movie-detail.html?id=${m.id}" class="movie-card-item fade">
            <img src="${getImageUrl(m.poster_image)}" alt="${m.title}" loading="lazy">
            <h3>${m.title}</h3>
            <span>${m.release_year || ''}${m.director_name ? ' · ' + m.director_name : ''}</span>
          </a>
        `).join('');
        document.querySelectorAll('.fade').forEach(el => el.classList.add('show'));
      })
      .catch(() => {
        document.getElementById('movieGrid').innerHTML = '<p class="empty-state">ไม่สามารถโหลดข้อมูลได้</p>';
      });
  </script>

</body>

</html>
