<!DOCTYPE html>
<html lang="th">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ผู้กำกับ — DO MOVIE</title>
  <link rel="stylesheet" href="../css/index.css">
  <script src="../js/config.js"></script>
  <style>
    body { background-color: #F5EFE6; }

    /* Profile Hero */
    .dir-hero { background-color: #F5EFE6; padding: 4rem 0; }
    .dir-con { display: flex; gap: 3rem; align-items: flex-start; }
    .dir-photo img {
      width: 200px; height: 200px; border-radius: 50%;
      object-fit: cover; border: 4px solid #2B1F14;
      box-shadow: 0 12px 30px rgba(0,0,0,0.2);
      flex-shrink: 0;
    }
    .dir-info { flex: 1; padding-top: 0.5rem; }
    .dir-name {
      font-family: 'Cinzel', serif;
      font-size: 2rem; color: #2B1F14; font-weight: 900; margin-bottom: 0.5rem;
    }
    .dir-meta { color: #888; font-size: 0.9rem; margin-bottom: 1.5rem; }
    .dir-bio { line-height: 1.9; color: #3A2A1A; font-size: 0.95rem; max-width: 600px; }

    /* Movies Section */
    .movies-section { background-color: #2B1F14; padding: 3rem 0; }
    .movies-title {
      font-family: 'Cinzel', serif;
      color: #F2C94C; font-size: 1.4rem; font-weight: 700; margin-bottom: 1.5rem;
    }
    .movies-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(155px, 1fr)); gap: 1.5rem; }
    .movie-card-link { text-decoration: none; text-align: center; display: block; transition: transform 0.25s; }
    .movie-card-link:hover { transform: translateY(-6px); }
    .movie-card-link img { width: 100%; aspect-ratio: 2/3; object-fit: cover; border-radius: 10px; box-shadow: 0 6px 20px rgba(0,0,0,0.4); }
    .movie-card-link h4 { color: #F2C94C; margin-top: 0.5rem; font-size: 0.88rem; }
    .movie-card-link span { color: #888; font-size: 0.76rem; }
    .empty-msg { grid-column: 1/-1; text-align: center; color: rgba(255,248,231,0.4); padding: 3rem 0; }

    .footer-simple { background-color: #1a120b; padding: 18px 0; text-align: center; color: #FFF8E7; font-size: 0.85rem; opacity: 0.6; }
  </style>
</head>

<body>

  <nav>
    <div class="container">
      <div class="nav-con">
        <div class="logo"><a href="main.html">DO <span>MOVIE</span></a></div>
        <ul class="menu">
          <li><a href="main.html">หน้าหลัก</a></li>
          <li class="has-dropdown">
            <a href="#">หมวดหมู่ ▾</a>
            <ul class="dropdown">
              <li><a href="Scifi_movie.html">Sci-Fi</a></li>
              <li><a href="Horor_movie.html">Horror</a></li>
            </ul>
          </li>
          <li><a href="DVD_INCEPTION.html">DVD</a></li>
          <li><a href="Item_forsale.html">ของที่ระลึก</a></li>
          <li><a href="data_board.html">กระดานรีวิว</a></li>
          <li><a href="directors.html" style="color:#F2C94C;">ผู้กำกับ</a></li>
          <li id="authNav"></li>
        </ul>
      </div>
    </div>
  </nav>

  <!-- Director Profile -->
  <section class="dir-hero">
    <div class="container">
      <div class="dir-con">
        <div class="dir-photo">
          <img id="dir-photo" src="../images/placeholder.jpg" alt="director">
        </div>
        <div class="dir-info">
          <h1 class="dir-name" id="dir-name">กำลังโหลด...</h1>
          <p class="dir-meta" id="dir-meta"></p>
          <p class="dir-bio" id="dir-bio"></p>
        </div>
      </div>
    </div>
  </section>

  <!-- Movies by Director -->
  <section class="movies-section">
    <div class="container">
      <h2 class="movies-title" id="moviesTitle">ผลงานภาพยนตร์</h2>
      <div class="movies-grid" id="moviesGrid">
        <p class="empty-msg">กำลังโหลด...</p>
      </div>
    </div>
  </section>

  <div class="footer-simple">&copy; 2026 Web DoMovie. All rights reserved.</div>

  <script>
    (function () {
      const _u = localStorage.getItem('username');
      const _s = localStorage.getItem('is_staff');
      const nav = document.getElementById('authNav');
      if (_u) {
        nav.innerHTML = `${_s === 'true' ? '<a href="/admin-panel/" style="color:#F2C94C;margin-right:8px;">Admin Panel</a>' : ''}<a href="#" id="logoutBtn" style="color:#ff6b6b;">${_u} (ออก)</a>`;
        document.getElementById('logoutBtn').addEventListener('click', e => {
          e.preventDefault(); localStorage.clear(); window.location.href = 'login.html';
        });
      } else {
        nav.innerHTML = '<a href="login.html">เข้าสู่ระบบ</a>';
      }
    })();

    const params = new URLSearchParams(location.search);
    const dirId = params.get('id');
    if (!dirId) location.href = 'directors.html';

    Promise.all([
      fetch(`${API_BASE}/directors/${dirId}/`).then(r => r.json()),
      fetch(`${API_BASE}/movies/`).then(r => r.json()),
    ])
      .then(([dir, allMovies]) => {
        document.title = `${dir.name} — DO MOVIE`;
        document.getElementById('dir-name').textContent = dir.name;
        document.getElementById('dir-meta').textContent =
          [dir.nationality, dir.birth_year ? `เกิด ค.ศ. ${dir.birth_year}` : ''].filter(Boolean).join(' · ');
        document.getElementById('dir-bio').textContent = dir.bio || '';
        if (dir.profile_image) document.getElementById('dir-photo').src = getImageUrl(dir.profile_image);

        const dirMovies = allMovies.filter(m => m.director === parseInt(dirId));
        document.getElementById('moviesTitle').textContent = `ผลงานภาพยนตร์ (${dirMovies.length} เรื่อง)`;
        const grid = document.getElementById('moviesGrid');
        if (!dirMovies.length) {
          grid.innerHTML = '<p class="empty-msg">ยังไม่มีหนัง</p>';
          return;
        }
        grid.innerHTML = dirMovies.map(m => `
          <a href="movie-detail.html?id=${m.id}" class="movie-card-link">
            <img src="${getImageUrl(m.poster_image)}" alt="${m.title}" loading="lazy">
            <h4>${m.title}</h4>
            <span>${m.release_year || ''}</span>
          </a>
        `).join('');
      })
      .catch(() => { document.getElementById('dir-name').textContent = 'ไม่พบข้อมูลผู้กำกับ'; });
  </script>

</body>

</html>
