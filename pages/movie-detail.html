<!DOCTYPE html>
<html lang="th">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>รายละเอียดหนัง — DO MOVIE</title>
  <link rel="stylesheet" href="../css/index.css">
  <script src="../js/config.js"></script>
  <style>
    body { background-color: #F5EFE6; }

    /* Detail Hero */
    .detail-hero { background-color: #F5EFE6; padding: 3.5rem 0; }
    .detail-con { display: flex; gap: 3rem; align-items: flex-start; }
    .detail-poster { flex: 0 0 260px; }
    .detail-poster img {
      width: 260px; aspect-ratio: 2/3; object-fit: cover;
      border-radius: 16px; box-shadow: 0 20px 50px rgba(0,0,0,0.25);
    }
    .detail-info { flex: 1; padding-top: 0.5rem; }
    .detail-title {
      font-family: 'Cinzel', serif;
      font-size: 2.2rem; color: #2B1F14; font-weight: 900;
      margin-bottom: 1rem; line-height: 1.2;
    }
    .detail-meta { display: flex; gap: 0.8rem; margin-bottom: 1.5rem; flex-wrap: wrap; }
    .detail-badge {
      background: #2B1F14; color: #F2C94C;
      padding: 4px 14px; border-radius: 999px;
      font-size: 0.82rem; font-weight: 700; letter-spacing: 0.5px;
    }
    .detail-synopsis { line-height: 1.9; color: #3A2A1A; font-size: 0.97rem; max-width: 560px; margin-bottom: 1.5rem; }
    .detail-director-label { color: #888; font-size: 0.85rem; margin-bottom: 0.3rem; }
    .detail-director-name { color: #2B1F14; font-size: 1.05rem; font-weight: 700; }

    /* Director Section */
    .director-section { background-color: #2B1F14; padding: 3rem 0; }
    .director-con { display: flex; gap: 2.5rem; align-items: center; }
    .director-photo img {
      width: 140px; height: 140px; border-radius: 50%;
      object-fit: cover; border: 3px solid #F2C94C;
      box-shadow: 0 8px 24px rgba(0,0,0,0.4);
    }
    .director-info h3 {
      font-family: 'Cinzel', serif;
      color: #F2C94C; font-size: 1.3rem; margin-bottom: 0.4rem;
    }
    .director-info .meta { color: #888; font-size: 0.85rem; margin-bottom: 0.8rem; }
    .director-info p { color: #FFF8E7; line-height: 1.7; font-size: 0.93rem; opacity: 0.85; max-width: 560px; margin-bottom: 0.8rem; }
    .director-info a { color: #F2C94C; font-size: 0.88rem; text-decoration: none; border-bottom: 1px solid rgba(242,201,76,0.4); transition: 0.3s; }
    .director-info a:hover { border-bottom-color: #F2C94C; }

    /* More Section */
    .more-section { background-color: #F5EFE6; padding: 3rem 0; }
    .more-title { font-family: 'Cinzel', serif; color: #2B1F14; font-size: 1.3rem; font-weight: 700; margin-bottom: 1.5rem; }
    .more-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); gap: 1.5rem; }
    .more-card { text-decoration: none; color: #2B1F14; text-align: center; display: block; transition: transform 0.25s; }
    .more-card:hover { transform: translateY(-6px); }
    .more-card img { width: 100%; aspect-ratio: 2/3; object-fit: cover; border-radius: 10px; box-shadow: 0 6px 16px rgba(0,0,0,0.15); }
    .more-card h4 { margin-top: 0.5rem; font-size: 0.88rem; color: #2B1F14; }
    .more-card span { font-size: 0.76rem; color: #888; }

    /* Simple footer */
    .footer-simple { background-color: #1a120b; padding: 18px 0; text-align: center; color: #FFF8E7; font-size: 0.85rem; opacity: 0.6; }
  </style>
</head>

<body>

  <nav>
    <div class="container">
      <div class="nav-con">
        <div class="logo"><a href="main.html">DO <span>MOVIE</span></a></div>
        <ul class="menu">
          <li><a href="main.html">หน้าหลัก</a></li>
          <li class="has-dropdown">
            <a href="#">หมวดหมู่ ▾</a>
            <ul class="dropdown">
              <li><a href="Scifi_movie.html">Sci-Fi</a></li>
              <li><a href="Horor_movie.html">Horror</a></li>
            </ul>
          </li>
          <li><a href="DVD_INCEPTION.html">DVD</a></li>
          <li><a href="Item_forsale.html">ของที่ระลึก</a></li>
          <li><a href="data_board.html">กระดานรีวิว</a></li>
          <li><a href="directors.html">ผู้กำกับ</a></li>
          <li id="authNav"></li>
        </ul>
      </div>
    </div>
  </nav>

  <!-- Movie Detail Hero -->
  <section class="detail-hero">
    <div class="container">
      <div class="detail-con">
        <div class="detail-poster">
          <img id="d-poster" src="../images/placeholder.jpg" alt="poster">
        </div>
        <div class="detail-info">
          <div class="detail-meta">
            <span class="detail-badge" id="d-genre"></span>
            <span class="detail-badge" id="d-year"></span>
          </div>
          <h1 class="detail-title" id="d-title">กำลังโหลด...</h1>
          <p class="detail-synopsis" id="d-synopsis"></p>
          <p class="detail-director-label">ผู้กำกับ</p>
          <p class="detail-director-name" id="d-director"></p>
        </div>
      </div>
    </div>
  </section>

  <!-- Director Bio -->
  <section class="director-section" id="directorSection">
    <div class="container">
      <div class="director-con">
        <div class="director-photo">
          <img id="dir-photo" src="../images/placeholder.jpg" alt="director">
        </div>
        <div class="director-info">
          <h3 id="dir-name">ผู้กำกับ</h3>
          <p class="meta" id="dir-meta"></p>
          <p id="dir-bio"></p>
          <a id="dir-link" href="#">ดูผลงานทั้งหมด →</a>
        </div>
      </div>
    </div>
  </section>

  <!-- More by Director -->
  <section class="more-section" id="moreSection" style="display:none;">
    <div class="container">
      <h2 class="more-title" id="moreTitle">หนังอื่นจากผู้กำกับ</h2>
      <div class="more-grid" id="moreGrid"></div>
    </div>
  </section>

  <div class="footer-simple">&copy; 2026 Web DoMovie. All rights reserved.</div>

  <script>
    (function () {
      const _u = localStorage.getItem('username');
      const _s = localStorage.getItem('is_staff');
      const nav = document.getElementById('authNav');
      if (_u) {
        nav.innerHTML = `${_s === 'true' ? '<a href="/admin-panel/" style="color:#F2C94C;margin-right:8px;">Admin Panel</a>' : ''}<a href="#" id="logoutBtn" style="color:#ff6b6b;">${_u} (ออก)</a>`;
        document.getElementById('logoutBtn').addEventListener('click', e => {
          e.preventDefault(); localStorage.clear(); window.location.href = 'login.html';
        });
      } else {
        nav.innerHTML = '<a href="login.html">เข้าสู่ระบบ</a>';
      }
    })();

    const params = new URLSearchParams(location.search);
    const movieId = params.get('id');
    if (!movieId) location.href = 'main.html';

    const genreLabel = { scifi: 'Sci-Fi', horror: 'Horror' };

    fetch(`${API_BASE}/movies/${movieId}/`)
      .then(r => r.json())
      .then(m => {
        document.title = `${m.title} — DO MOVIE`;
        document.getElementById('d-poster').src = getImageUrl(m.poster_image);
        document.getElementById('d-title').textContent = m.title;
        document.getElementById('d-genre').textContent = genreLabel[m.genre] || m.genre;
        document.getElementById('d-year').textContent = m.release_year || '';
        document.getElementById('d-synopsis').textContent = m.synopsis || '';
        document.getElementById('d-director').textContent = m.director_name || '';

        if (m.director) {
          document.getElementById('dir-link').href = `director-detail.html?id=${m.director}`;
          return fetch(`${API_BASE}/directors/${m.director}/`)
            .then(r => r.json())
            .then(dir => {
              document.getElementById('dir-name').textContent = dir.name;
              document.getElementById('dir-meta').textContent =
                [dir.nationality, dir.birth_year ? `เกิด ค.ศ. ${dir.birth_year}` : ''].filter(Boolean).join(' · ');
              document.getElementById('dir-bio').textContent = dir.bio || '';
              if (dir.profile_image) document.getElementById('dir-photo').src = getImageUrl(dir.profile_image);

              return fetch(`${API_BASE}/movies/`)
                .then(r => r.json())
                .then(all => {
                  const others = all.filter(x => x.director === m.director && x.id !== m.id);
                  if (!others.length) return;
                  document.getElementById('moreTitle').textContent = `หนังอื่นจาก ${dir.name}`;
                  document.getElementById('moreSection').style.display = 'block';
                  document.getElementById('moreGrid').innerHTML = others.map(x => `
                    <a href="movie-detail.html?id=${x.id}" class="more-card">
                      <img src="${getImageUrl(x.poster_image)}" alt="${x.title}" loading="lazy">
                      <h4>${x.title}</h4>
                      <span>${x.release_year || ''}</span>
                    </a>
                  `).join('');
                });
            });
        }
      })
      .catch(() => { document.getElementById('d-title').textContent = 'ไม่พบหนัง'; });
  </script>

</body>

</html>
