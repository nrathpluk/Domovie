<!DOCTYPE html>
<html lang="th">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>คำสั่งซื้อ — DO MOVIE</title>
  <link rel="stylesheet" href="../css/index.css">
  <script src="../js/config.js"></script>
  <style>
    body { background-color: #F5EFE6; }

    .order-section { padding: 3rem 0 5rem; }
    .order-title {
      font-family: 'Cinzel', serif;
      font-size: 2rem; color: #2B1F14; font-weight: 900;
      margin-bottom: 2rem; text-transform: uppercase; letter-spacing: 1px;
    }

    /* Product Table */
    .product-table {
      width: 100%; border-collapse: collapse;
      background: #FFF8E7; border-radius: 14px;
      overflow: hidden; box-shadow: 0 8px 24px rgba(0,0,0,0.1);
      margin-bottom: 2rem;
    }
    .product-table thead tr { background-color: #2B1F14; color: #F2C94C; }
    .product-table th { padding: 14px 18px; text-align: left; font-size: 0.88rem; font-weight: 700; letter-spacing: 0.5px; }
    .product-table td { padding: 12px 18px; font-size: 0.92rem; border-bottom: 1px solid rgba(43,31,20,0.08); color: #3A2A1A; }
    .product-table tbody tr:last-child td { border-bottom: none; }
    .product-table tbody tr:hover { background: rgba(242,201,76,0.06); }
    .price-cell { color: #c0392b; font-weight: 700; }

    .buy-btn {
      padding: 7px 18px;
      cursor: pointer;
      background: #F2C94C;
      color: #2B1F14;
      border: none;
      border-radius: 999px;
      font-weight: 700;
      font-size: 0.85rem;
      transition: 0.3s;
    }
    .buy-btn:hover { background: #C9A227; transform: translateY(-1px); }

    /* Cart Summary */
    .cart-summary {
      background: #2B1F14;
      color: #FFF8E7;
      border-radius: 16px;
      padding: 2rem 2.5rem;
      max-width: 400px;
      margin-left: auto;
      box-shadow: 0 8px 24px rgba(0,0,0,0.3);
    }
    .cart-summary h3 {
      font-family: 'Cinzel', serif;
      color: #F2C94C; font-size: 1.1rem; margin-bottom: 1.2rem;
    }
    .cart-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 0.8rem; font-size: 0.93rem; }
    .cart-row span:last-child { font-weight: 700; color: #F2C94C; }
    .checkout-btn {
      width: 100%;
      margin-top: 1.5rem;
      padding: 13px;
      cursor: pointer;
      background: #F2C94C;
      color: #2B1F14;
      border: none;
      border-radius: 999px;
      font-weight: 700;
      font-size: 1rem;
      transition: 0.3s;
    }
    .checkout-btn:hover { background: #C9A227; transform: translateY(-2px); }
    .loading-msg { color: #888; padding: 2rem 0; font-size: 0.95rem; }
  </style>
</head>

<body>

  <nav>
    <div class="container">
      <div class="nav-con">
        <div class="logo"><a href="main.html">DO <span>MOVIE</span></a></div>
        <ul class="menu">
          <li><a href="main.html">หน้าหลัก</a></li>
          <li class="has-dropdown">
            <a href="#">หมวดหมู่ ▾</a>
            <ul class="dropdown">
              <li><a href="Scifi_movie.html">Sci-Fi</a></li>
              <li><a href="Horor_movie.html">Horror</a></li>
            </ul>
          </li>
          <li><a href="DVD_INCEPTION.html">DVD</a></li>
          <li><a href="Item_forsale.html">ของที่ระลึก</a></li>
          <li><a href="data_board.html">กระดานรีวิว</a></li>
          <li><a href="directors.html">ผู้กำกับ</a></li>
          <li id="authNav"></li>
        </ul>
      </div>
    </div>
  </nav>

  <div class="order-section">
    <div class="container">
      <h2 class="order-title">คำสั่งซื้อสินค้า</h2>
      <div id="loadingMsg" class="loading-msg">กำลังโหลดสินค้า...</div>

      <table class="product-table" id="productTable" style="display:none;">
        <thead>
          <tr>
            <th>No.</th>
            <th>ชื่อสินค้า</th>
            <th>ราคา</th>
            <th>Stock</th>
            <th></th>
          </tr>
        </thead>
        <tbody id="productRows"></tbody>
      </table>

      <div class="cart-summary" id="summary" style="display:none;">
        <h3>สรุปรายการ</h3>
        <div class="cart-row">
          <span>จำนวนที่สั่ง</span>
          <span><span id="total-count">0</span> รายการ</span>
        </div>
        <div class="cart-row">
          <span>ราคารวม</span>
          <span>฿<span id="total-price">0</span></span>
        </div>
        <button class="checkout-btn" id="checkout-btn">ชำระเงิน</button>
      </div>
    </div>
  </div>

  <script>
    (function () {
      const _u = localStorage.getItem('username');
      const _s = localStorage.getItem('is_staff');
      const nav = document.getElementById('authNav');
      if (_u) {
        nav.innerHTML = `${_s === 'true' ? '<a href="/admin-panel/" style="color:#F2C94C;margin-right:8px;">Admin Panel</a>' : ''}<a href="#" id="logoutBtn" style="color:#ff6b6b;">${_u} (ออก)</a>`;
        document.getElementById('logoutBtn').addEventListener('click', e => {
          e.preventDefault(); localStorage.clear(); window.location.href = 'login.html';
        });
      } else {
        nav.innerHTML = '<a href="login.html">เข้าสู่ระบบ</a>';
      }
    })();

    let cart = [];

    function renderCart() {
      document.getElementById('total-count').textContent = cart.length;
      document.getElementById('total-price').textContent =
        cart.reduce((s, i) => s + i.price, 0).toLocaleString();
    }

    fetch(`${API_BASE}/products/`)
      .then(r => r.json())
      .then(products => {
        document.getElementById('loadingMsg').style.display = 'none';
        document.getElementById('productTable').style.display = 'table';
        document.getElementById('summary').style.display = 'block';

        const tbody = document.getElementById('productRows');
        tbody.innerHTML = products.map((p, i) => `
          <tr>
            <td>${i + 1}</td>
            <td>${p.name}</td>
            <td class="price-cell">฿${parseFloat(p.price).toLocaleString()}</td>
            <td>${p.stock}</td>
            <td><button class="buy-btn" data-name="${p.name}" data-price="${p.price}">สั่งซื้อ</button></td>
          </tr>
        `).join('');

        tbody.querySelectorAll('.buy-btn').forEach(btn => {
          btn.addEventListener('click', function () {
            cart.push({ name: this.dataset.name, price: parseFloat(this.dataset.price) });
            renderCart();
          });
        });
      })
      .catch(() => {
        document.getElementById('loadingMsg').textContent = 'ไม่สามารถโหลดข้อมูลสินค้าได้';
      });

    document.getElementById('checkout-btn').addEventListener('click', function () {
      if (!cart.length) return;
      let total = cart.reduce((s, i) => s + i.price, 0);
      let discount = cart.length > 3 ? total * 0.10 : 0;
      let afterDiscount = total - discount;
      let vat = afterDiscount * 0.07;
      let grandTotal = afterDiscount + vat;

      alert(
        `--- สรุปยอดชำระ ---\n` +
        `จำนวน: ${cart.length} รายการ\n` +
        `ราคารวม: ${total.toLocaleString()} บาท\n` +
        `ส่วนลด (10%): -${discount.toLocaleString()} บาท\n` +
        `ภาษี VAT (7%): ${vat.toFixed(2)} บาท\n` +
        `------------------\n` +
        `ยอดรวมสุทธิ: ${grandTotal.toFixed(2)} บาท`
      );
      cart = [];
      renderCart();
    });
  </script>

</body>

</html>
