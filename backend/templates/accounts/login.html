{% load static %}
<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DO MOVIE - เข้าสู่ระบบ</title>
    <link rel="stylesheet" href="{% static 'movies/css/regist.css' %}">
</head>
<body>
    <div class="content-item fade show">
        <div class="register-box">
            <a href="{% url 'movies:index' %}" class="back-btn">←</a>
            <form method="post" id="loginForm">
                {% csrf_token %}
                <h2>เข้าสู่ระบบ</h2>

                <label>Username *</label>
                <input type="text" name="username" placeholder="Enter Username" required>

                <label>Password *</label>
                <input type="password" name="password" placeholder="Enter Password" required>

                {% if form.errors %}
                <p style="color: #ff6b6b; font-size: 13px; text-align: center; margin-top: 10px;">
                    ชื่อผู้ใช้หรือรหัสผ่านไม่ถูกต้อง
                </p>
                {% endif %}

                <button type="submit">เข้าสู่ระบบ</button>

                <div style="text-align: center; margin-top: 20px; font-size: 14px;">
                    <span style="color: #ccc;">ยังไม่มีบัญชีใช่หรือไม่?</span>
                    <a href="{% url 'accounts:register' %}" style="color: #f5c76a; text-decoration: none;">สมัครสมาชิกเลย</a>
                </div>
            </form>
        </div>
    </div>
</body>
</html>
