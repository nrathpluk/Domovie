<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login — DO MOVIE</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            background-color: #1a120b;
            color: #FFF8E7;
            font-family: "Segoe UI", sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .login-card {
            background: #2B1F14;
            border-radius: 16px;
            padding: 2.5rem 2rem;
            width: 100%;
            max-width: 380px;
            border: 1px solid rgba(242,201,76,0.2);
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
        }
        .logo {
            font-size: 1.6rem; font-weight: 900;
            color: #F2C94C; text-align: center;
            letter-spacing: 2px; margin-bottom: 0.3rem;
        }
        .logo span { color: #FFF8E7; }
        .subtitle { text-align: center; color: #888; font-size: 0.85rem; margin-bottom: 2rem; }
        .form-group { margin-bottom: 1.2rem; }
        .form-group label { display: block; margin-bottom: 6px; color: #f5c76a; font-size: 0.88rem; }
        .form-group input {
            width: 100%; padding: 10px 14px; border-radius: 8px;
            border: 1px solid rgba(58,42,26,0.8);
            background: rgba(255,255,255,0.06);
            color: #FFF8E7; font-size: 0.95rem; outline: none;
        }
        .form-group input:focus { border-color: #F2C94C; }
        .btn-login {
            width: 100%; padding: 12px;
            background: #F2C94C; color: #2B1F14;
            border: none; border-radius: 8px;
            font-size: 1rem; font-weight: 700;
            cursor: pointer; transition: 0.2s;
            margin-top: 0.5rem;
        }
        .btn-login:hover { background: #C9A227; }
        .error-msg {
            background: rgba(255,107,107,0.15);
            color: #ff6b6b;
            border: 1px solid #ff6b6b;
            border-radius: 8px;
            padding: 10px 14px;
            font-size: 0.88rem;
            margin-bottom: 1rem;
            text-align: center;
        }
    </style>
</head>
<body>
    <div class="login-card">
        <div class="logo">DO <span>MOVIE</span></div>
        <p class="subtitle">Admin Panel — เข้าสู่ระบบ</p>

        {% if error %}
        <div class="error-msg">ชื่อผู้ใช้หรือรหัสผ่านไม่ถูกต้อง</div>
        {% endif %}

        <form method="post" action="{% url 'admin_panel:admin_login' %}">
            {% csrf_token %}
            <input type="hidden" name="next" value="{{ request.GET.next }}">
            <div class="form-group">
                <label>Username</label>
                <input type="text" name="username" autofocus required>
            </div>
            <div class="form-group">
                <label>Password</label>
                <input type="password" name="password" required>
            </div>
            <button type="submit" class="btn-login">เข้าสู่ระบบ</button>
        </form>
    </div>
</body>
</html>
