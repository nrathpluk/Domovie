{% extends "admin_panel/base_admin.html" %}

{% block admin_title %}ลบผู้กำกับ{% endblock %}

{% block admin_content %}
<h1 class="page-title">ยืนยันการลบ</h1>
<div class="confirm-box">
    <p style="font-size: 1.1rem; margin-bottom: 1.5rem;">
        คุณต้องการลบผู้กำกับ <strong style="color: #F2C94C;">{{ director.name }}</strong> ใช่หรือไม่?<br>
        <span style="font-size: 0.85rem; color: #ff6b6b;">หนังทั้งหมดของผู้กำกับนี้จะถูกลบด้วย</span>
    </p>
    <form method="post">
        {% csrf_token %}
        <button type="submit" class="btn btn-danger" style="margin-right: 1rem;">ลบ</button>
        <a href="{% url 'admin_panel:directors_list' %}" class="btn btn-secondary">ยกเลิก</a>
    </form>
</div>
{% endblock %}
