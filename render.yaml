services:
  - type: web
    name: domovie-backend
    env: python
    rootDir: backend

    buildCommand: "pip install -r requirements.txt && python manage.py migrate && python manage.py collectstatic --noinput && python manage.py create_default_superuser"

    startCommand: gunicorn domovie.wsgi:application --bind 0.0.0.0:$PORT

    envVars:
      - key: SECRET_KEY
        generateValue: true

      - key: DEBUG
        value: "False"

      - key: ALLOWED_HOSTS
        value: domovie-backend.onrender.com

      - key: CORS_ALLOWED_ORIGINS
        value: https://domovie.pages.dev

      - key: DJANGO_SUPERUSER_USERNAME
        sync: false

      - key: DJANGO_SUPERUSER_EMAIL
        sync: false

      - key: DJANGO_SUPERUSER_PASSWORD
        sync: false

      - key: DATABASE_URL
        fromDatabase:
          name: domovie-db
          property: connectionString

databases:
  - name: domovie-db
    databaseName: domovie
    user: domovie