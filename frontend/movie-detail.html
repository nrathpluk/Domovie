<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Movie — DoMovie</title>
    <link rel="stylesheet" href="/css/main.css">
    <style>
        .detail-wrap {
            display: flex;
            gap: 3rem;
            padding: 3rem 0;
            align-items: flex-start;
        }
        .detail-poster {
            flex-shrink: 0;
            width: 260px;
        }
        .detail-poster img {
            width: 100%;
            display: block;
            border: 1px solid var(--border);
        }
        .detail-poster .card-img-placeholder {
            width: 100%;
            aspect-ratio: 2/3;
        }
        .detail-info {
            flex: 1;
        }
        .detail-title {
            font-family: var(--font-d);
            font-size: 2.8rem;
            letter-spacing: 0.03em;
            color: var(--cream);
            margin-bottom: 0.4rem;
            line-height: 1;
        }
        .detail-meta {
            font-size: 0.65rem;
            letter-spacing: 0.14em;
            text-transform: uppercase;
            color: var(--muted);
            margin-bottom: 1.8rem;
        }
        .detail-synopsis {
            font-size: 0.95rem;
            color: var(--text);
            line-height: 1.7;
            max-width: 560px;
            margin-bottom: 2.5rem;
        }
        .detail-dvds-title {
            font-family: var(--font-b);
            font-size: 0.6rem;
            letter-spacing: 0.14em;
            text-transform: uppercase;
            color: var(--muted);
            margin-bottom: 1rem;
        }
        .dvd-row {
            display: flex;
            align-items: center;
            gap: 1.2rem;
            padding: 0.9rem 1.1rem;
            background: var(--surface);
            border: 1px solid var(--border);
            margin-bottom: 0.5rem;
        }
        .dvd-row-price {
            font-family: var(--font-d);
            font-size: 1.2rem;
            color: var(--gold);
            flex: 1;
        }
        .dvd-row-stock {
            font-size: 0.6rem;
            letter-spacing: 0.1em;
            text-transform: uppercase;
            color: var(--muted);
        }
        .dvd-row-stock.out { color: var(--danger); }
        .back-link {
            display: inline-block;
            font-size: 0.65rem;
            letter-spacing: 0.12em;
            text-transform: uppercase;
            color: var(--muted);
            text-decoration: none;
            margin-bottom: 2rem;
        }
        .back-link:hover { color: var(--cream); }
        @media (max-width: 640px) {
            .detail-wrap { flex-direction: column; }
            .detail-poster { width: 100%; max-width: 260px; }
        }
    </style>
</head>
<body>
    <nav id="main-nav"></nav>

    <div class="container">
        <a class="back-link" href="movies.html">← Back to Movies</a>
        <div id="detail-content"><div class="loading">Loading…</div></div>
    </div>

    <script src="/js/api.js"></script>
    <script src="/js/auth.js"></script>
    <script src="/js/nav.js"></script>
    <script>
        async function loadDetail() {
            var params = new URLSearchParams(window.location.search);
            var id = params.get('id');
            console.log('movie-detail id:', id);
            if (!id) {
                document.getElementById('detail-content').innerHTML = '<p>No movie ID provided.</p>';
                return;
            }

            var res = await apiFetch('/movies/' + id + '/');
            if (!res) return;
            if (!res.ok) {
                document.getElementById('detail-content').innerHTML = '<p>Movie not found.</p>';
                return;
            }
            var m = await res.json();
            console.log('movie data:', m);

            document.title = m.title + ' — DoMovie';

            var year = m.release_date ? m.release_date.slice(0, 4) : '';
            var meta = [m.director_name || 'Unknown Director', year].filter(Boolean).join(' \u2022 ');

            var dvdsHtml = '';
            var dvdRes = await apiFetch('/dvds/?movie=' + id);
            if (dvdRes && dvdRes.ok) {
                var dvdData = await dvdRes.json();
                console.log('dvd data:', dvdData);
                var dvds = dvdData.results || dvdData;
                if (dvds.length) {
                    dvdsHtml = '<div class="detail-dvds-title">Available on DVD</div>' +
                        dvds.map(function(d) {
                            var stockLabel = d.stock > 0
                                ? d.stock + ' in stock'
                                : 'Out of stock';
                            var stockClass = d.stock > 0 ? '' : ' out';
                            return '<div class="dvd-row">' +
                                '<span class="dvd-row-price">$' + parseFloat(d.price).toFixed(2) + '</span>' +
                                '<span class="dvd-row-stock' + stockClass + '">' + stockLabel + '</span>' +
                                (d.stock > 0
                                    ? '<button class="btn btn-primary" onclick="addToCart(' + d.id + ')">Add to Cart</button>'
                                    : '') +
                                '</div>';
                        }).join('');
                } else {
                    dvdsHtml = '<div class="detail-dvds-title">No DVDs available</div>';
                }
            }

            document.getElementById('detail-content').innerHTML =
                '<div class="detail-wrap">' +
                    '<div class="detail-poster">' +
                        (m.poster_url
                            ? '<img src="' + m.poster_url + '" alt="' + m.title + '">'
                            : '<div class="card-img-placeholder">NO FILM</div>') +
                    '</div>' +
                    '<div class="detail-info">' +
                        '<div class="detail-title">' + m.title + '</div>' +
                        '<div class="detail-meta">' + meta + '</div>' +
                        (m.synopsis ? '<div class="detail-synopsis">' + m.synopsis + '</div>' : '') +
                        dvdsHtml +
                    '</div>' +
                '</div>';
        }

        function addToCart(dvdId) {
            var cart = JSON.parse(localStorage.getItem('cart') || '[]');
            var existing = cart.find(function(i) { return i.dvd === dvdId; });
            if (existing) {
                existing.quantity += 1;
            } else {
                cart.push({ dvd: dvdId, quantity: 1 });
            }
            localStorage.setItem('cart', JSON.stringify(cart));
            alert('Added to cart.');
        }

        document.addEventListener('DOMContentLoaded', loadDetail);
    </script>
</body>
</html>
