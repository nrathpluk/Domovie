<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Movie — DoMovie</title>
    <link rel="stylesheet" href="/css/main.css">
</head>
<body>
    <nav id="main-nav"></nav>

    <div class="container">
        <a class="back-link" href="movies.html">← Back to Movies</a>
        <div id="detail-content"><div class="loading">Loading…</div></div>
    </div>

    <script src="/js/api.js"></script>
    <script src="/js/auth.js"></script>
    <script src="/js/nav.js"></script>
    <script>
        async function loadDetail() {
            var params = new URLSearchParams(window.location.search);
            var id = params.get('id');
            if (!id) {
                document.getElementById('detail-content').innerHTML = '<p>No movie ID provided.</p>';
                return;
            }

            var res = await apiFetch('/movies/' + id + '/');
            if (!res) return;
            if (!res.ok) {
                document.getElementById('detail-content').innerHTML = '<p>Movie not found.</p>';
                return;
            }
            var m = await res.json();

            document.title = m.title + ' — DoMovie';

            var year = m.release_date ? m.release_date.slice(0, 4) : '';
            var meta = [m.director_name || 'Unknown Director', year].filter(Boolean).join(' \u2022 ');

            var dvdsHtml = '';
            var dvdRes = await apiFetch('/dvds/?movie=' + id);
            if (dvdRes && dvdRes.ok) {
                var dvdData = await dvdRes.json();
                var dvds = dvdData.results || dvdData;
                if (dvds.length) {
                    dvdsHtml = '<div class="detail-dvds-title">Available on DVD</div>' +
                        dvds.map(function(d) {
                            var stockLabel = d.stock > 0 ? d.stock + ' in stock' : 'Out of stock';
                            var stockClass = d.stock > 0 ? '' : ' out';
                            return '<div class="dvd-row">' +
                                '<span class="dvd-row-price">$' + parseFloat(d.price).toFixed(2) + '</span>' +
                                '<span class="dvd-row-stock' + stockClass + '">' + stockLabel + '</span>' +
                                (d.stock > 0
                                    ? '<button class="btn btn-primary btn-sm" onclick="addToCart(' + d.id + ', this)">Add to Cart</button>'
                                    : '') +
                                '</div>';
                        }).join('');
                } else {
                    dvdsHtml = '<div class="detail-dvds-title">No DVDs available</div>';
                }
            }

            document.getElementById('detail-content').innerHTML =
                '<div class="detail-wrap">' +
                    '<div class="detail-poster">' +
                        (m.poster_url
                            ? '<img src="' + m.poster_url + '" alt="' + m.title + '">'
                            : '<div class="card-img-placeholder">NO FILM</div>') +
                    '</div>' +
                    '<div class="detail-info">' +
                        '<div class="detail-title">' + m.title + '</div>' +
                        '<div class="detail-meta">' + meta + '</div>' +
                        (m.synopsis ? '<div class="detail-synopsis">' + m.synopsis + '</div>' : '') +
                        dvdsHtml +
                    '</div>' +
                '</div>';
        }

        function addToCart(dvdId, btn) {
            var cart = JSON.parse(localStorage.getItem('cart') || '[]');
            var existing = cart.find(function(i) { return i.dvd === dvdId; });
            if (existing) {
                existing.quantity += 1;
            } else {
                cart.push({ dvd: dvdId, quantity: 1 });
            }
            localStorage.setItem('cart', JSON.stringify(cart));
            showToast('Added to cart', 'success');
            if (btn) {
                var orig = btn.textContent;
                btn.textContent = 'Added';
                btn.disabled = true;
                setTimeout(function () { btn.textContent = orig; btn.disabled = false; }, 1400);
            }
        }

        document.addEventListener('DOMContentLoaded', loadDetail);
    </script>
</body>
</html>
