<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Director — DoMovie</title>
    <link rel="stylesheet" href="/css/main.css">
    <style>
        .detail-wrap {
            display: flex;
            gap: 3rem;
            padding: 3rem 0;
            align-items: flex-start;
        }
        .detail-poster {
            flex-shrink: 0;
            width: 260px;
        }
        .detail-poster .card-img-placeholder {
            width: 100%;
            aspect-ratio: 2/3;
        }
        .detail-info {
            flex: 1;
        }
        .detail-title {
            font-family: var(--font-d);
            font-size: 2.8rem;
            letter-spacing: 0.03em;
            color: var(--cream);
            margin-bottom: 0.4rem;
            line-height: 1;
        }
        .detail-meta {
            font-size: 0.65rem;
            letter-spacing: 0.14em;
            text-transform: uppercase;
            color: var(--muted);
            margin-bottom: 1.8rem;
        }
        .detail-synopsis {
            font-size: 0.95rem;
            color: var(--text);
            line-height: 1.7;
            max-width: 560px;
            margin-bottom: 2.5rem;
        }
        .detail-section-title {
            font-family: var(--font-b);
            font-size: 0.6rem;
            letter-spacing: 0.14em;
            text-transform: uppercase;
            color: var(--muted);
            margin-bottom: 1rem;
        }
        .movie-row {
            display: flex;
            align-items: center;
            gap: 1.2rem;
            padding: 0.9rem 1.1rem;
            background: var(--surface);
            border: 1px solid var(--border);
            margin-bottom: 0.5rem;
            text-decoration: none;
            color: inherit;
            transition: border-color 220ms var(--ease);
        }
        .movie-row:hover {
            border-color: var(--border-h);
        }
        .movie-row-title {
            font-family: var(--font-d);
            font-size: 1.1rem;
            color: var(--cream);
            flex: 1;
        }
        .movie-row-year {
            font-size: 0.6rem;
            letter-spacing: 0.1em;
            text-transform: uppercase;
            color: var(--muted);
        }
        .back-link {
            display: inline-block;
            font-size: 0.65rem;
            letter-spacing: 0.12em;
            text-transform: uppercase;
            color: var(--muted);
            text-decoration: none;
            margin-bottom: 2rem;
        }
        .back-link:hover { color: var(--cream); }
        @media (max-width: 640px) {
            .detail-wrap { flex-direction: column; }
            .detail-poster { width: 100%; max-width: 260px; }
        }
    </style>
</head>
<body>
    <nav id="main-nav"></nav>

    <div class="container">
        <a class="back-link" href="directors.html">← Back to Directors</a>
        <div id="detail-content"><div class="loading">Loading…</div></div>
    </div>

    <script src="/js/api.js"></script>
    <script src="/js/auth.js"></script>
    <script src="/js/nav.js"></script>
    <script>
        function formatDate(dateStr) {
            if (!dateStr) return '';
            var d = new Date(dateStr);
            var months = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
            return String(d.getUTCDate()).padStart(2, '0') + ' ' + months[d.getUTCMonth()] + ' ' + d.getUTCFullYear();
        }

        function loadDetail() {
            var params = new URLSearchParams(window.location.search);
            var id = params.get('id');
            console.log('director-detail id:', id);

            if (!id) {
                document.getElementById('detail-content').innerHTML = '<p>No director ID provided.</p>';
                return;
            }

            apiFetch('/directors/' + id + '/').then(function(res) {
                if (!res) return;
                if (!res.ok) {
                    document.getElementById('detail-content').innerHTML = '<p>Director not found.</p>';
                    return;
                }
                return res.json();
            }).then(function(director) {
                if (!director) return;
                console.log('director data:', director);

                document.title = director.name + ' — DoMovie';

                return apiFetch('/movies/?director=' + id).then(function(movRes) {
                    var moviesHtml = '';
                    if (movRes && movRes.ok) {
                        return movRes.json().then(function(movData) {
                            console.log('movies data:', movData);
                            var movies = movData.results || movData;
                            if (movies.length) {
                                moviesHtml = '<div class="detail-section-title">Filmography</div>' +
                                    movies.map(function(m) {
                                        var year = m.release_date ? m.release_date.slice(0, 4) : '';
                                        return '<a class="movie-row" href="movie-detail.html?id=' + m.id + '">' +
                                            '<span class="movie-row-title">' + m.title + '</span>' +
                                            (year ? '<span class="movie-row-year">' + year + '</span>' : '') +
                                        '</a>';
                                    }).join('');
                            } else {
                                moviesHtml = '<div class="detail-section-title">Filmography</div>' +
                                    '<p style="color:var(--muted);font-size:0.85rem;">No movies found.</p>';
                            }
                            renderDetail(director, moviesHtml);
                        });
                    } else {
                        renderDetail(director, moviesHtml);
                    }
                });
            });
        }

        function renderDetail(director, moviesHtml) {
            document.getElementById('detail-content').innerHTML =
                '<div class="detail-wrap">' +
                    '<div class="detail-poster">' +
                        '<div class="card-img-placeholder">NO PHOTO</div>' +
                    '</div>' +
                    '<div class="detail-info">' +
                        '<div class="detail-title">' + director.name + '</div>' +
                        (director.birth_date
                            ? '<div class="detail-meta">' + formatDate(director.birth_date) + '</div>'
                            : '') +
                        (director.bio
                            ? '<div class="detail-synopsis">' + director.bio + '</div>'
                            : '') +
                        moviesHtml +
                    '</div>' +
                '</div>';
        }

        document.addEventListener('DOMContentLoaded', loadDetail);
    </script>
</body>
</html>
