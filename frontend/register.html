<!DOCTYPE html> <!-- ตายตัว: บอก browser ว่าเป็น HTML5 -->
<html lang="en"> <!-- ตายตัว: root element ระบุภาษาหลักเป็นอังกฤษ -->
<head> <!-- ตายตัว: เปิด section meta -->
    <meta charset="UTF-8"> <!-- ตายตัว: encoding UTF-8 -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0"> <!-- ตายตัว: responsive สำหรับมือถือ -->
    <title>Register — DoMovie</title> <!-- ชื่อ tab หน้า Register -->
    <link rel="stylesheet" href="/css/main.css"> <!-- ตายตัว: โหลด CSS หลัก -->
</head> <!-- ตายตัว: ปิด head -->
<body> <!-- ตายตัว: เปิด section เนื้อหา -->
    <div class="form-page"> <!-- layout แบบ 2 คอลัมน์: ซ้ายตกแต่ง / ขวาฟอร์ม -->
        <div class="form-page-left"> <!-- panel ซ้ายสำหรับตกแต่ง (ซ่อนบนมือถือ) -->
            <div class="form-page-left-bg"></div> <!-- gradient background ตกแต่ง panel ซ้าย -->
            <div class="form-page-wordmark">DOMOVIE</div> <!-- ชื่อแบรนด์แนวตั้งขนาดใหญ่ (opacity ต่ำ) -->
            <div class="form-page-accent"> <!-- container คำโควตที่มุมล่างซ้าย -->
                <p class="form-page-accent-text"> <!-- ย่อหน้าคำโควตจาก Roger Ebert -->
                    "Every great film should seem new every time you see it." <!-- ข้อความโควต -->
                    <em class="form-page-accent-attr">— Roger Ebert</em> <!-- แหล่งที่มาของโควต -->
                </p> <!-- ปิด paragraph -->
            </div> <!-- ปิด form-page-accent -->
        </div> <!-- ปิด form-page-left -->

        <div class="form-page-right"> <!-- panel ขวาสำหรับ form สมัครสมาชิก -->
            <div class="form-container"> <!-- wrapper จำกัดความกว้างสูงสุด 380px -->
                <div class="form-brand">DOMOVIE</div> <!-- ชื่อแบรนด์หัวฟอร์ม พร้อม dot สีแดง (ผ่าน ::before) -->
                <div class="form-title">Create your account</div> <!-- คำอธิบายย่อยใต้แบรนด์ -->

                <div id="alert" class="alert alert-error"></div> <!-- element แสดง error message — ซ่อนโดย default -->

                <form id="register-form"> <!-- form สมัครสมาชิก — JavaScript ดัก submit -->
                    <div class="form-group"> <!-- กลุ่ม input username -->
                        <label for="username">Username</label> <!-- label ผูกกับ input id="username" -->
                        <input type="text" id="username" required autocomplete="username" placeholder="choose a username"> <!-- ช่อง username บังคับกรอก -->
                    </div> <!-- ปิด form-group username -->
                    <div class="form-group"> <!-- กลุ่ม input email -->
                        <label for="email">Email (optional)</label> <!-- label บอกว่า email ไม่บังคับ -->
                        <input type="email" id="email" autocomplete="email" placeholder="you@example.com"> <!-- ช่อง email ไม่บังคับ browser validate format อัตโนมัติ -->
                    </div> <!-- ปิด form-group email -->
                    <div class="form-group"> <!-- กลุ่ม input password -->
                        <label for="password">Password (min 6 characters)</label> <!-- label บอกเงื่อนไขรหัสผ่าน -->
                        <input type="password" id="password" required autocomplete="new-password" minlength="6" placeholder="••••••••"> <!-- ช่อง password บังคับกรอก ต่ำสุด 6 ตัวอักษร -->
                    </div> <!-- ปิด form-group password -->
                    <div class="form-actions"> <!-- wrapper ปุ่ม submit -->
                        <button type="submit" class="btn btn-primary">Create Account</button> <!-- ปุ่ม submit ฟอร์ม -->
                    </div> <!-- ปิด form-actions -->
                </form> <!-- ปิด form -->

                <div class="form-footer"> <!-- footer ของฟอร์มสำหรับ link ไปหน้า Login -->
                    Already have an account? <a href="/login.html">Login</a> <!-- ข้อความและลิงก์ไปหน้าเข้าสู่ระบบ -->
                </div> <!-- ปิด form-footer -->
            </div> <!-- ปิด form-container -->
        </div> <!-- ปิด form-page-right -->
    </div> <!-- ปิด form-page -->

    <script src="/js/api.js"></script> <!-- ตายตัว: โหลด API utilities รวมถึง API_BASE และ apiFetch -->
    <script src="/js/auth.js"></script> <!-- ตายตัว: โหลด auth utilities รวมถึง isLoggedIn และ setAuth -->
    <script>
        if (isLoggedIn()) window.location.href = '/index.html'; // ถ้า login อยู่แล้ว → redirect ไปหน้าหลักทันที

        document.getElementById('register-form').addEventListener('submit', async function(e) { // ดักจับ submit form
            e.preventDefault(); // ป้องกัน browser reload หน้าตามพฤติกรรมปกติ
            var alertEl = document.getElementById('alert'); // หา element alert
            alertEl.style.display = 'none'; // ซ่อน alert เก่าก่อนส่งคำขอใหม่

            var payload = { // สร้าง object ข้อมูลที่จะส่งไป API
                username: document.getElementById('username').value.trim(), // อ่านค่า username และตัด whitespace
                password: document.getElementById('password').value, // อ่านค่า password
                email: document.getElementById('email').value.trim(), // อ่านค่า email และตัด whitespace
            };

            try { // ลอง fetch API
                var res = await fetch(API_BASE + '/auth/register/', { // เรียก POST /auth/register/
                    method: 'POST', // ระบุ method เป็น POST
                    headers: { 'Content-Type': 'application/json' }, // ส่งข้อมูลเป็น JSON
                    body: JSON.stringify(payload), // แปลง payload เป็น JSON string
                });
                var data = await res.json(); // แปลง response เป็น object
                if (res.ok) { // ถ้า status 200-299
                    setAuth(data); // บันทึก token และข้อมูล user ลง localStorage
                    window.location.href = '/index.html'; // redirect ไปหน้าหลัก
                } else { // ถ้า validation fail หรือ error อื่น
                    var msgs = Object.values(data).flat().join(' '); // รวม error messages ทุก field เป็น string เดียว
                    alertEl.textContent = msgs || 'Registration failed.'; // แสดง error หรือ fallback
                    alertEl.style.display = 'block'; // แสดง alert
                }
            } catch (err) { // ถ้า network error หรือ fetch ล้มเหลว
                alertEl.textContent = 'Network error. Try again.'; // แสดงข้อความ network error
                alertEl.style.display = 'block'; // แสดง alert
            }
        });
    </script>
</body> <!-- ตายตัว: ปิด body -->
</html> <!-- ตายตัว: ปิด root element -->
